quarkus.application.name=microservico-analise-inteligente
quarkus.http.port=8090

quarkus.http.host=0.0.0.0
# Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Configuração do REST Client apontando para o seu BFF
# Em produção, você pode usar variável de ambiente: ${URL_BFF:http://microservico-radares-bff:8081}
quarkus.rest-client.bff-api.url=http://localhost:8081

# Log
quarkus.log.level=INFO

# URL do seu Eureka Server (ajuste se estiver usando o nome do container no Docker)
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/